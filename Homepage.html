<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p class="title">Driver Hub</p>
    <div class="container-1">
        <form action="" style="border:1px solid #ccc">
            <div class="container">
              <h1>Join the Community of Driver Hub</h1>
              <p>Please fill in this form to create an account.</p>
              <hr>
          
              <label for="name">Name</label>
              <input type="text" placeholder="Enter Your Full Name" name="name" required>
          
              <label for="cell">Cell Phone No.</label>
              <input type="text" placeholder="Enter Contact Number" name="cell" required>
          
              <label for="email">Email</label>
              <input type="email" placeholder="Enter Email" name="email" required>
          
              <label>
                <input type="radio" name="gender" style="margin-bottom:15px"> Male
                <input type="radio" name="gender" style="margin-bottom:15px">Female
              </label>
          
              <p>Sign Up as</p>
          
              <div class="buttons">
                <a href="Passenger_signup.html"><button class="passenger">Passenger</button></a>
                <a href="Car_owner_signup.html"><button class="car_owner">Car Owner</button></a>
                <a href="Driver_signup.html"><button class="driver">Driver</button></a>
              </div>
              <b><a href="Sign_in.html">Already Have An Account?</a></b>
            </div>
          </form>
    </div>
</body>
</html>
